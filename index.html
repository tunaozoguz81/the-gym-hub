<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Gym Hub</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym Hub">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
    body{background:#0f172a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;overscroll-behavior:none;}
    .hide{display:none!important;}
    .btn-primary{background:linear-gradient(135deg,#22c55e,#16a34a);border:none;cursor:pointer;}
    .btn-primary:active{opacity:.85;}
    .card{background:#1e293b;border-radius:14px;padding:16px;}
    .bottom-nav{background:#0a1120;border-top:1px solid #1e293b;position:fixed;bottom:0;left:0;right:0;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
    .tab-active{border-bottom:2px solid #22c55e;color:#22c55e;}
    input,select,textarea{background:#0f172a;color:#fff;border:1.5px solid #334155;border-radius:10px;padding:11px 14px;width:100%;outline:none;font-size:16px;}
    input:focus,select:focus,textarea:focus{border-color:#22c55e;}
    select option{background:#1e293b;}
    textarea{resize:none;}
    .page{min-height:100dvh;padding-bottom:80px;}
    header{background:#0a1120;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:40;padding:14px 16px;display:flex;align-items:center;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:60;display:flex;align-items:flex-end;}
    .modal-sheet{background:#1e293b;width:100%;border-radius:20px 20px 0 0;padding:20px 16px 40px;max-height:90dvh;overflow-y:auto;}
    #reader{width:100%;}
    #reader video{border-radius:12px;}
    .progress-bar{background:#1e293b;border-radius:99px;height:10px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:99px;transition:width .4s;}
    ::-webkit-scrollbar{display:none;}
    .spinner{width:28px;height:28px;border:3px solid #334155;border-top-color:#22c55e;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────────
const uid = () => '_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const esc = t => String(t ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today = () => new Date().toLocaleDateString('tr-TR');
const fmtDate = d => d ? new Date(d).toLocaleDateString('tr-TR') : '—';
const slugDate = d => d || new Date().toISOString().split('T')[0];

// ─────────────────────────────────────────────────────────────
//  DATABASE
// ─────────────────────────────────────────────────────────────
const DB = {
  _g(k){ try{ return JSON.parse(localStorage.getItem(k)) }catch{ return null } },
  _s(k,v){ localStorage.setItem(k,JSON.stringify(v)) },

  init(){
    if(!this._g('gh_settings'))
      this._s('gh_settings',{packageOptions:[8,12,20],studioName:'The Gym Hub'});
    if(!this._g('gh_users'))
      this._s('gh_users',[{id:'admin-001',name:'Admin',role:'admin',username:'TheGymHub2025',password:'Aezakmi2471.',trainerProfile:null}]);
    // Admin bilgilerini her zaman güncelle
    const users=this._g('gh_users')||[];
    const ai=users.findIndex(u=>u.id==='admin-001');
    if(ai>=0){users[ai].username='TheGymHub2025';users[ai].password='Aezakmi2471.';this._s('gh_users',users);}
    if(!this._g('gh_members'))   this._s('gh_members',[]);
    if(!this._g('gh_measures'))  this._s('gh_measures',[]);
  },

  // Settings
  settings(){ return this._g('gh_settings')||{packageOptions:[8,12,20]}; },
  saveSettings(s){ this._s('gh_settings',s); },

  // Users
  users(){ return this._g('gh_users')||[]; },
  userById(id){ return this.users().find(u=>u.id===id); },
  userByName(un){ return this.users().find(u=>u.username===un); },
  trainers(){ return this.users().filter(u=>u.role==='trainer'); },
  addUser(u){ const a=this.users(); u.id=uid(); a.push(u); this._s('gh_users',a); return u; },
  updateUser(id,data){
    const a=this.users(); const i=a.findIndex(u=>u.id===id);
    if(i>=0){a[i]={...a[i],...data};this._s('gh_users',a);}
  },
  deleteUser(id){ this._s('gh_users',this.users().filter(u=>u.id!==id)); },

  // Members
  members(){ return this._g('gh_members')||[]; },
  memberById(id){ return this.members().find(m=>m.id===id); },
  addMember(m){ const a=this.members(); m.id=uid(); m.lessonHistory=[]; a.push(m); this._s('gh_members',a); return m; },
  updateMember(id,data){
    const a=this.members(); const i=a.findIndex(m=>m.id===id);
    if(i>=0){a[i]={...a[i],...data};this._s('gh_members',a);}
  },
  deleteMember(id){
    this._s('gh_members',this.members().filter(m=>m.id!==id));
    this._s('gh_measures',this.measures().filter(m=>m.memberId!==id));
  },
  deductLesson(memberId, trainerId){
    const a=this.members(); const i=a.findIndex(m=>m.id===memberId);
    if(i<0||a[i].packageUsed>=a[i].packageTotal) return false;
    a[i].packageUsed++;
    const tr=this.userById(trainerId);
    a[i].lessonHistory.unshift({date:today(),trainerName:tr?tr.name:'Bilinmiyor',trainerId});
    this._s('gh_members',a);
    return true;
  },

  useCancel(memberId, trainerId){
    const a=this.members(); const i=a.findIndex(m=>m.id===memberId);
    if(i<0) return false;
    const m=a[i];
    if((m.cancelUsed||0)>=(m.cancelTotal||0)) return false;
    a[i].cancelUsed=(m.cancelUsed||0)+1;
    const tr=this.userById(trainerId);
    a[i].lessonHistory.unshift({date:today(),trainerName:tr?tr.name:'Bilinmiyor',trainerId,type:'iptal'});
    this._s('gh_members',a);
    return true;
  },

  // Measurements
  measures(){ return this._g('gh_measures')||[]; },
  measuresByMember(id){ return this.measures().filter(m=>m.memberId===id).sort((a,b)=>new Date(b.date)-new Date(a.date)); },
  addMeasure(d){ const a=this.measures(); d.id=uid(); a.push(d); this._s('gh_measures',a); },
  deleteMeasure(id){ this._s('gh_measures',this.measures().filter(m=>m.id!==id)); },
};

// ─────────────────────────────────────────────────────────────
//  AUTH
// ─────────────────────────────────────────────────────────────
const Auth = {
  login(un,pw){
    const u=DB.userByName(un);
    if(u&&u.password===pw){ localStorage.setItem('gh_sess',JSON.stringify({id:u.id,role:u.role,name:u.name})); return u; }
    return null;
  },
  logout(){ localStorage.removeItem('gh_sess'); },
  me(){ try{ return JSON.parse(localStorage.getItem('gh_sess')); }catch{ return null; } },
  isAdmin(){ const u=this.me(); return u&&u.role==='admin'; },
};

// ─────────────────────────────────────────────────────────────
//  ROUTER
// ─────────────────────────────────────────────────────────────
let VIEW='login', PARAMS={};
let _scanner=null, _chart=null;

function go(view,params={}){
  if(_scanner){ try{_scanner.stop();}catch{} _scanner=null; }
  if(_chart){ _chart.destroy(); _chart=null; }
  VIEW=view; PARAMS=params;
  draw();
}

function draw(){
  const u=Auth.me();
  if(!u && VIEW!=='login') VIEW='login';
  const map={login:vLogin,dashboard:vDashboard,members:vMembers,
    'member-form':vMemberForm,'member-detail':vMemberDetail,
    scanner:vScanner,trainers:vTrainers,'trainer-form':vTrainerForm,settings:vSettings};
  document.getElementById('app').innerHTML=(map[VIEW]||vLogin)();
  afterDraw();
}

// ─────────────────────────────────────────────────────────────
//  SHARED COMPONENTS
// ─────────────────────────────────────────────────────────────
function navBar(active){
  const u=Auth.me(); if(!u) return '';
  const tabs=u.role==='admin'
    ?[{v:'dashboard',i:'🏠',l:'Ana Sayfa'},{v:'members',i:'👥',l:'Üyeler'},
      {v:'scanner',i:'📷',l:'QR Tara'},{v:'trainers',i:'🏋️',l:'Hocalar'},{v:'settings',i:'⚙️',l:'Ayarlar'}]
    :[{v:'dashboard',i:'🏠',l:'Ana Sayfa'},{v:'scanner',i:'📷',l:'QR Tara'},{v:'trainers',i:'🏋️',l:'Hocalar'}];
  return `<nav class="bottom-nav flex">${tabs.map(t=>`
    <button onclick="go('${t.v}')" class="flex-1 flex flex-col items-center py-2 text-xs ${active===t.v?'text-green-400':'text-slate-500'}">
      <span class="text-xl leading-none mb-0.5">${t.i}</span>${esc(t.l)}
    </button>`).join('')}</nav>`;
}

function topBar(title,back=null,backP={},showLogo=false){
  const b=back?`<button onclick="go('${back}',${JSON.stringify(backP)})" class="text-green-400 text-2xl leading-none mr-3 font-light">‹</button>`:'';
  const logo=showLogo?`<img src="logo.png" alt="" class="h-8 object-contain mr-2">`:'';  
  return `<header>${b}${logo}<span class="text-white font-bold text-lg flex-1">${esc(title)}</span></header>`;
}

function statusBadge(rem,total){
  if(rem===0) return '<span class="text-xs px-2 py-0.5 rounded-full bg-red-900/50 text-red-400 font-bold">Bitti</span>';
  if(rem<=3)  return `<span class="text-xs px-2 py-0.5 rounded-full bg-yellow-900/50 text-yellow-400 font-bold">${rem}/${total}</span>`;
  return `<span class="text-xs px-2 py-0.5 rounded-full bg-green-900/50 text-green-400 font-bold">${rem}/${total}</span>`;
}

function avatar(name,size='w-10 h-10'){
  const colors=['bg-green-500','bg-pink-600','bg-violet-600','bg-blue-600','bg-teal-600'];
  const c=colors[(name||'?').charCodeAt(0)%colors.length];
  return `<div class="${size} ${c} rounded-full flex items-center justify-center font-bold text-white flex-shrink-0">${(name||'?')[0].toUpperCase()}</div>`;
}

// ─────────────────────────────────────────────────────────────
//  VIEWS
// ─────────────────────────────────────────────────────────────

// LOGIN
function vLogin(){
  return `
  <div class="min-h-dvh flex flex-col items-center justify-center px-6" style="background:linear-gradient(160deg,#0f172a 0%,#1e1b4b 100%)">
    <div class="w-full max-w-sm">
      <div class="text-center mb-10">
        <img src="logo.png" alt="The Gym Hub" class="w-48 mx-auto mb-2 object-contain" style="max-height:120px">
        <h1 class="text-4xl font-black text-white tracking-tight">The Gym Hub</h1>
        <p class="text-slate-400 mt-2">Stüdyo Yönetim Paneli</p>
      </div>
      <div class="card space-y-4">
        <div>
          <label class="text-xs text-slate-400 mb-1.5 block">Kullanıcı Adı</label>
          <input id="lu" type="text" placeholder="Kullanıcı adınız" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>
        <div>
          <label class="text-xs text-slate-400 mb-1.5 block">Şifre</label>
          <input id="lp" type="password" placeholder="••••••••">
        </div>
        <div id="lerr" class="hide text-red-400 text-sm text-center py-1 bg-red-900/20 rounded-lg"></div>
        <button onclick="doLogin()" class="btn-primary w-full text-white font-bold py-3.5 rounded-xl text-base">
          Giriş Yap
        </button>
      </div>
    </div>
  </div>`;
}

// DASHBOARD
function vDashboard(){
  const u=Auth.me(), members=DB.members();
  const td=today();
  const todayN=members.reduce((n,m)=>n+(m.lessonHistory?.[0]?.date===td?1:0),0);
  const expN=members.filter(m=>m.packageUsed>=m.packageTotal).length;
  const lowN=members.filter(m=>{const r=m.packageTotal-m.packageUsed;return r>0&&r<=3;}).length;
  return `
  <div class="page">
    ${topBar('', null, {}, true)}
    <div class="px-4 pt-5 pb-4">
      <div class="flex items-center mb-6">
        <div>
          <p class="text-slate-400 text-sm">Hoş geldiniz 👋</p>
          <h2 class="text-white text-xl font-bold">${esc(u.name)}</h2>
        </div>
        <span class="ml-auto text-3xl">${u.role==='admin'?'👑':'🏋️'}</span>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="card text-center py-5">
          <div class="text-4xl font-black text-green-400">${members.length}</div>
          <div class="text-slate-400 text-xs mt-1">Toplam Üye</div>
        </div>
        <div class="card text-center py-5">
          <div class="text-4xl font-black text-green-400">${todayN}</div>
          <div class="text-slate-400 text-xs mt-1">Bugün Gelen</div>
        </div>
        <div class="card text-center py-5">
          <div class="text-4xl font-black text-yellow-400">${lowN}</div>
          <div class="text-slate-400 text-xs mt-1">Az Ders Kalan</div>
        </div>
        <div class="card text-center py-5">
          <div class="text-4xl font-black text-red-400">${expN}</div>
          <div class="text-slate-400 text-xs mt-1">Paketi Biten</div>
        </div>
      </div>
      <h3 class="text-white font-semibold mb-3 text-sm uppercase tracking-wide text-slate-400">Hızlı Erişim</h3>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="go('scanner')" class="card flex flex-col items-center py-6 active:opacity-70">
          <span class="text-4xl mb-2">📷</span>
          <span class="text-white font-semibold">QR Tara</span>
          <span class="text-slate-500 text-xs mt-0.5">Ders düş</span>
        </button>
        ${Auth.isAdmin()?`
        <button onclick="go('member-form')" class="card flex flex-col items-center py-6 active:opacity-70">
          <span class="text-4xl mb-2">➕</span>
          <span class="text-white font-semibold">Üye Ekle</span>
          <span class="text-slate-500 text-xs mt-0.5">Yeni kayıt</span>
        </button>`:`
        <button onclick="go('trainers')" class="card flex flex-col items-center py-6 active:opacity-70">
          <span class="text-4xl mb-2">🏋️</span>
          <span class="text-white font-semibold">Hocalar</span>
          <span class="text-slate-500 text-xs mt-0.5">CV sayfası</span>
        </button>`}
      </div>
      ${expN>0?`<div class="mt-4 bg-red-950/60 border border-red-800/60 rounded-xl p-3.5">
        <p class="text-red-400 text-sm font-semibold">⚠️ ${expN} üyenin paketi bitmiş</p>
        <button onclick="go('members')" class="text-red-300 text-xs mt-1 underline">Üyeleri görüntüle →</button>
      </div>`:''}
      ${lowN>0||expN>0?`
      <div class="mt-4">
        <h3 class="text-slate-400 text-xs uppercase tracking-wide font-semibold mb-2">📲 Hatırlatma Gönder</h3>
        <div class="space-y-2">
          ${members.filter(m=>{const r=m.packageTotal-m.packageUsed;return r>=0&&r<=3;}).map(m=>{
            const r=m.packageTotal-m.packageUsed;
            const msg=r===0
              ?`Merhaba ${m.name.split(' ')[0]}, paketindeki dersler sona erdi. Yeni paket almak için bizimle iletişime geçebilirsin 💪`
              :`Merhaba ${m.name.split(' ')[0]}, paketinde yalnızca ${r} ders kaldı. Yeni paket için bizimle iletişime geçmeyi unutma 💪`;
            const wa=m.phone?`https://wa.me/90${m.phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`:'';
            return `<div class="card flex items-center justify-between py-3">
              <div>
                <p class="text-white text-sm font-semibold">${esc(m.name)}</p>
                <p class="${r===0?'text-red-400':'text-yellow-400'} text-xs">${r===0?'Paket bitti':''+r+' ders kaldı'}</p>
              </div>
              ${wa?`<a href="${wa}" target="_blank" class="bg-green-600 text-white text-xs font-bold px-3 py-2 rounded-xl">WhatsApp</a>`
                  :`<span class="text-slate-600 text-xs">Telefon yok</span>`}
            </div>`;
          }).join('')}
        </div>
      </div>`:''}
    </div>
  </div>
  ${navBar('dashboard')}`;
}

// MEMBERS LIST
function vMembers(){
  const members=DB.members();
  return `
  <div class="page">
    ${topBar('Üyeler')}
    <div class="px-4 pt-4">
      <div class="flex gap-2 mb-4">
        <input id="msearch" type="search" placeholder="🔍 Üye ara..." oninput="filterMembers(this.value)" class="flex-1">
        ${Auth.isAdmin()?`<button onclick="go('member-form')" class="btn-primary text-white w-11 h-11 rounded-xl text-2xl leading-none flex-shrink-0 flex items-center justify-center">+</button>`:''}
      </div>
      <div id="mlist">${memberCards(members)}</div>
    </div>
  </div>
  ${navBar('members')}`;
}

function memberCards(list){
  if(!list.length) return `<div class="text-center py-16 text-slate-500">
    <div class="text-6xl mb-3">👥</div>
    <p class="mb-4">Henüz üye yok</p>
    ${Auth.isAdmin()?`<button onclick="go('member-form')" class="btn-primary text-white px-6 py-2.5 rounded-xl font-semibold">Üye Ekle</button>`:''}
  </div>`;
  return list.map(m=>{
    const rem=m.packageTotal-m.packageUsed;
    const tr=DB.userById(m.trainerId);
    return `<div onclick="go('member-detail',{id:'${m.id}'})" class="card mb-3 flex items-center gap-3 active:opacity-70 cursor-pointer">
      ${avatar(`${m.firstName}${m.lastName}`)}
      <div class="flex-1 min-w-0">
        <p class="text-white font-semibold truncate">${esc(m.firstName)} ${esc(m.lastName)}</p>
        <p class="text-slate-500 text-xs truncate">${tr?esc(tr.name):'Hoca atanmadı'}</p>
      </div>
      <div class="text-right flex-shrink-0">
        ${statusBadge(rem,m.packageTotal)}
        <p class="text-slate-600 text-xs mt-1">${m.lessonHistory?.[0]?.date||'—'}</p>
      </div>
    </div>`;
  }).join('');
}

// MEMBER FORM
function vMemberForm(){
  const {id}=PARAMS, m=id?DB.memberById(id):null;
  const settings=DB.settings(), trainers=DB.trainers();
  return `
  <div class="page">
    ${topBar(m?'Üyeyi Düzenle':'Yeni Üye','members')}
    <div class="px-4 pt-4 space-y-3.5">
      <div class="grid grid-cols-2 gap-3">
        <div><label class="label">Ad *</label><input id="ff" type="text" placeholder="Ad" value="${esc(m?.firstName||'')}"></div>
        <div><label class="label">Soyad *</label><input id="fl" type="text" placeholder="Soyad" value="${esc(m?.lastName||'')}"></div>
      </div>
      <div><label class="label">Telefon</label><input id="fp" type="tel" placeholder="0xxx xxx xx xx" value="${esc(m?.phone||'')}"></div>
      <div><label class="label">Doğum Tarihi</label><input id="fd" type="date" value="${m?.dob||''}"></div>
      <div><label class="label">Paket *</label>
        <select id="fk">${settings.packageOptions.map(o=>`<option value="${o}" ${m?.packageTotal==o?'selected':''}>${o} Ders</option>`).join('')}</select>
      </div>
      <div><label class="label">Başlangıç Tarihi</label><input id="fs" type="date" value="${m?.startDate||slugDate()}"></div>
      <div><label class="label">Atanan Hoca</label>
        <select id="ft"><option value="">— Hoca seçiniz —</option>
          ${trainers.map(t=>`<option value="${t.id}" ${m?.trainerId===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}
        </select>
      </div>
      <div id="ferr" class="hide text-red-400 text-sm bg-red-900/20 rounded-lg p-3"></div>
      <button onclick="saveMember('${id||''}')" class="btn-primary w-full text-white font-bold py-3.5 rounded-xl">${m?'Güncelle':'Üye Ekle'}</button>
      ${m?`<button onclick="delMember('${id}')" class="w-full bg-red-900/30 border border-red-800/50 text-red-400 font-semibold py-3 rounded-xl">Üyeyi Sil</button>`:''}
    </div>
  </div>
  ${navBar('members')}`;
}

// MEMBER DETAIL
function vMemberDetail(){
  const {id,tab='qr'}=PARAMS, m=DB.memberById(id);
  if(!m) return `<div class="p-4 text-white">Üye bulunamadı. <button onclick="go('members')" class="text-green-400">Geri dön</button></div>`;
  const tr=DB.userById(m.trainerId), rem=m.packageTotal-m.packageUsed;
  const tabs=[['qr','📱 QR Kod'],['paket','🎫 Paket'],['olcum','📊 Ölçümler']];
  let content='';
  if(tab==='qr')    content=tabQR(m);
  if(tab==='paket') content=tabPackage(m,tr,rem);
  if(tab==='olcum') content=tabMeasure(m);
  return `
  <div class="page">
    ${topBar(`${esc(m.firstName)} ${esc(m.lastName)}`,'members')}
    <div class="px-4 pt-3">
      <div class="card flex items-center gap-3 mb-4">
        ${avatar(`${m.firstName}${m.lastName}`,'w-12 h-12')}
        <div class="flex-1 min-w-0">
          <p class="text-white font-bold">${esc(m.firstName)} ${esc(m.lastName)}</p>
          <p class="text-slate-400 text-sm">${esc(m.phone||'—')}</p>
        </div>
        ${Auth.isAdmin()?`<button onclick="go('member-form',{id:'${id}'})" class="text-green-400 text-sm font-semibold flex-shrink-0">Düzenle</button>`:''}
      </div>

// ─────────────────────────────────────────────────────────────
function afterDraw(){
  const {tab,id}=PARAMS;

  if(VIEW==='member-detail' && tab==='qr'){
    setTimeout(()=>{
      const w=document.getElementById('qr-wrap');
      if(w&&typeof QRCode!=='undefined'){
        new QRCode(w,{text:id,width:220,height:220,colorDark:'#000',colorLight:'#fff'});
      }
    },60);
  }

  if(VIEW==='member-detail' && tab==='olcum'){
    setTimeout(()=>{
      const canvas=document.getElementById('wc');
      if(!canvas) return;
      const data=DB.measuresByMember(id).filter(r=>r.weight!=null).reverse();
      if(data.length<2) return;
      _chart=new Chart(canvas,{
        type:'line',
        data:{
          labels:data.map(r=>r.date),
          datasets:[{label:'kg',data:data.map(r=>r.weight),
            borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.12)',
            tension:.35,fill:true,pointBackgroundColor:'#22c55e',pointRadius:4}]
        },
        options:{responsive:true,
          plugins:{legend:{display:false}},
          scales:{
            x:{ticks:{color:'#64748b',maxRotation:30,font:{size:10}},grid:{color:'#1e293b'}},
            y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1e293b'}}
          }
        }
      });
    },80);
  }

  if(VIEW==='scanner') setTimeout(startScanner,300);
}

// ─────────────────────────────────────────────────────────────
//  QR SCANNER
// ─────────────────────────────────────────────────────────────
function startScanner(){
  const u=Auth.me(); if(!u) return;
  try{
    _scanner=new Html5Qrcode('reader');
    _scanner.start(
      {facingMode:'environment'},
      {fps:10,qrbox:{width:240,height:240}},
      decodedText=>{ _scanner.stop(); handleScan(decodedText,u); },
      ()=>{}
    ).catch(err=>{
      const el=document.getElementById('reader');
      if(el) el.innerHTML=`<div class="text-red-400 text-sm p-4 text-center">⚠️ Kamera erişimi sağlanamadı.<br><small class="text-slate-500">${err}</small></div>`;
    });
  }catch(e){
    const el=document.getElementById('reader');
    if(el) el.innerHTML=`<div class="text-slate-500 text-sm p-4 text-center">QR tarayıcı yüklenemedi.</div>`;
  }
}

function handleScan(memberId, u){
  const el=document.getElementById('sres');
  if(!el) return;
  const m=DB.memberById(memberId);
  if(!m){
    el.innerHTML=`<div class="card border border-red-800/60">
      <p class="text-red-400 font-bold text-center">❌ Üye bulunamadı</p>
      <p class="text-slate-400 text-sm text-center mt-1">Bu QR koda kayıtlı üye yok</p>
      <button onclick="go('scanner')" class="btn-primary w-full text-white font-bold py-3 rounded-xl mt-4">Tekrar Dene</button>
    </div>`;
    return;
  }
  const rem=m.packageTotal-m.packageUsed;
  el.innerHTML=`<div class="card border ${rem>0?'border-green-800/60':'border-red-800/60'}">
    <div class="flex items-center gap-3 mb-4">
      ${avatar(`${m.firstName}${m.lastName}`,'w-12 h-12')}
      <div>
        <p class="text-white font-bold text-lg">${esc(m.firstName)} ${esc(m.lastName)}</p>
        <p class="text-slate-400 text-sm">${esc(m.phone||'—')}</p>
      </div>
    </div>
    <div class="bg-slate-700/40 rounded-xl p-3 mb-4 flex justify-between items-center">
      <span class="text-slate-400 text-sm">Kalan Ders</span>
      <span class="font-black text-xl ${rem>3?'text-green-400':rem>0?'text-yellow-400':'text-red-400'}">${rem}/${m.packageTotal}</span>
    </div>
    ${rem>0
      ?`<button onclick="confirmDeduct('${m.id}','${u.id}')" class="btn-primary w-full text-white font-bold py-3.5 rounded-xl">
          ✅ Ders Düş — ${rem-1} ders kalır
        </button>
        ${(m.cancelTotal||0)>0&&((m.cancelTotal||0)-(m.cancelUsed||0))>0?`
        <button onclick="confirmCancel('${m.id}','${u.id}')"
          class="w-full bg-yellow-900/40 border border-yellow-700/50 text-yellow-400 font-bold py-3 rounded-xl">
          🚫 İptal Hakkı Kullan (${(m.cancelTotal||0)-(m.cancelUsed||0)} hak kaldı)
        </button>`:''}`
      :`<div class="text-center text-red-400 font-bold py-2">❌ Paket tükendi — yenileme gerekli</div>`}
    <button onclick="go('scanner')" class="mt-2 w-full bg-slate-700/50 text-white font-semibold py-3 rounded-xl">Yeni Tarama</button>
  </div>`;
}

function previewPhoto(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const data=e.target.result;
    document.getElementById('tph-photo').value=data;
    const label=document.getElementById('photo-label');
    if(label) label.innerHTML=`<img src="${data}" class="w-24 h-24 rounded-xl object-cover"><span class="text-slate-400 text-xs mt-1">Değiştirmek için tekrar tıkla</span><input type="file" accept="image/*" onchange="previewPhoto(this)" class="hide">`;
  };
  reader.readAsDataURL(file);
}

  const data={
    firstName:fn, lastName:ln,

    dob:document.getElementById('fd')?.value||'',
    packageTotal:parseInt(document.getElementById('fk')?.value)||8,
    startDate:document.getElementById('fs')?.value||slugDate(),
    trainerId:document.getElementById('ft')?.value||'',
  };
  if(id){ const ex=DB.memberById(id); data.packageUsed=ex.packageUsed; data.cancelUsed=ex.cancelUsed||0; data.cancelTotal=data.packageTotal===8?2:0; DB.updateMember(id,data); }
  else{ data.packageUsed=0; data.cancelUsed=0; data.cancelTotal=data.packageTotal===8?2:0; DB.addMember(data); }
  go('members');
}

function delMember(id){
  if(confirm('Bu üyeyi ve tüm verilerini silmek istiyor musunuz?')){ DB.deleteMember(id); go('members'); }
}

function saveTrainer(id){
  const err=document.getElementById('terr');
  const profile={
    title:document.getElementById('tti')?.value.trim()||'',
    bio:document.getElementById('tb')?.value.trim()||'',
    specialties:(document.getElementById('tsp')?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
    certifications:(document.getElementById('tce')?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
    phone:document.getElementById('tph')?.value.trim()||'',
    email:document.getElementById('tem')?.value.trim()||'',
    avatar:document.getElementById('tav')?.value.trim()||'',
    photo:document.getElementById('tph-photo')?.value||'',
  };
  if(id){ DB.updateUser(id,{trainerProfile:profile}); go('trainers'); return; }
  const name=document.getElementById('tn')?.value.trim();
  const uname=document.getElementById('tu')?.value.trim();
  const pw=document.getElementById('tpw')?.value;
  if(!name||!uname||!pw){ err.textContent='Ad, kullanıcı adı ve şifre zorunludur.'; err.classList.remove('hide'); return; }
  if(DB.userByName(uname)){ err.textContent='Bu kullanıcı adı zaten kullanılıyor.'; err.classList.remove('hide'); return; }
  DB.addUser({name,username:uname,password:pw,role:'trainer',trainerProfile:profile});
  go('trainers');
}

function delTrainer(id){
  if(confirm('Bu hocayı silmek istiyor musunuz?')){ DB.deleteUser(id); go('trainers'); }
}

function confirmCancel(memberId,trainerId){
  const ok=DB.useCancel(memberId,trainerId);
  if(!ok) return;
  const m=DB.memberById(memberId);
  const el=document.getElementById('sres');
  if(!el) return;
  el.innerHTML=`<div class="card border border-yellow-800/60 text-center py-8">
    <div class="text-6xl mb-3">🚫</div>
    <p class="text-white font-black text-xl">${esc(m.firstName)} ${esc(m.lastName)}</p>
    <p class="text-yellow-400 font-semibold mt-2">İptal hakkı kullanıldı</p>
    <p class="text-slate-400 text-sm mt-1">${(m.cancelTotal||0)-(m.cancelUsed||0)} iptal hakkı kaldı</p>
    <button onclick="go('scanner')" class="btn-primary text-white font-bold py-3 px-10 rounded-xl mt-5">Yeni Tarama</button>
  </div>`;
}

function confirmDeduct(memberId,trainerId){
  const ok=DB.deductLesson(memberId,trainerId);
  if(!ok) return;
  const m=DB.memberById(memberId);
  const el=document.getElementById('sres');
  if(!el) return;
  el.innerHTML=`<div class="card border border-green-800/60 text-center py-8">
    <div class="text-6xl mb-3">✅</div>
    <p class="text-white font-black text-xl">${esc(m.firstName)} ${esc(m.lastName)}</p>
    <p class="text-green-400 font-semibold mt-2">Ders başarıyla düşüldü</p>
    <p class="text-slate-400 text-sm mt-1">${m.packageTotal-m.packageUsed} ders kaldı</p>
    <button onclick="go('scanner')" class="btn-primary text-white font-bold py-3 px-10 rounded-xl mt-5">Yeni Tarama</button>
  </div>`;
}

function showMeasureModal(memberId){
  document.getElementById('mmodal')?.classList.remove('hide');
}

function saveMeasure(memberId){
  const fileInput=document.getElementById('mphoto');
  const file=fileInput?.files?.[0];
  if(file){
    const reader=new FileReader();
    reader.onload=function(e){
      DB.addMeasure({
        memberId,
        date:document.getElementById('md')?.value||slugDate(),
        weight:parseFloat(document.getElementById('mw')?.value)||null,
        bodyFat:parseFloat(document.getElementById('mbf')?.value)||null,
        waist:parseFloat(document.getElementById('mwa')?.value)||null,
        hip:parseFloat(document.getElementById('mhi')?.value)||null,
        chest:parseFloat(document.getElementById('mch')?.value)||null,
        thigh:parseFloat(document.getElementById('mth')?.value)||null,
        photo:e.target.result,
      });
      go('member-detail',{id:memberId,tab:'olcum'});
    };
    reader.readAsDataURL(file);
  } else {
    DB.addMeasure({
      memberId,
      date:document.getElementById('md')?.value||slugDate(),
      weight:parseFloat(document.getElementById('mw')?.value)||null,
      bodyFat:parseFloat(document.getElementById('mbf')?.value)||null,
      waist:parseFloat(document.getElementById('mwa')?.value)||null,
      hip:parseFloat(document.getElementById('mhi')?.value)||null,
      chest:parseFloat(document.getElementById('mch')?.value)||null,
      thigh:parseFloat(document.getElementById('mth')?.value)||null,
    });
    go('member-detail',{id:memberId,tab:'olcum'});
  }
}

function showRenewModal(memberId){
  document.getElementById('renewmodal')?.classList.remove('hide');
}

function manualLesson(memberId){
  const m=DB.memberById(memberId);
  if(!m){ alert('Üye bulunamadı.'); return; }
  if(m.packageUsed>=m.packageTotal){ alert('Paketin tüm dersleri kullanılmış.'); return; }
  const u=Auth.me();
  const history=m.lessonHistory||[];
  history.unshift({date:slugDate(),trainerName:u?.name||'Admin',type:'ders'});
  DB.updateMember(memberId,{packageUsed:(m.packageUsed||0)+1,lessonHistory:history});
  go('member-detail',{id:memberId,tab:'paket'});
}

function manualCancel(memberId){
  const m=DB.memberById(memberId);
  if(!m){ alert('Üye bulunamadı.'); return; }
  if(!m.cancelTotal||m.cancelTotal===0){ alert('Bu paketin iptal hakkı yok.'); return; }
  if((m.cancelUsed||0)>=(m.cancelTotal||0)){ alert('İptal hakkı tükendi.'); return; }
  const u=Auth.me();
  const history=m.lessonHistory||[];
  history.unshift({date:slugDate(),trainerName:u?.name||'Admin',type:'iptal'});
  DB.updateMember(memberId,{cancelUsed:(m.cancelUsed||0)+1,lessonHistory:history});
  go('member-detail',{id:memberId,tab:'paket'});
}

function renewPackage(memberId){
  const newTotal=parseInt(document.getElementById('rnpk')?.value);
  if(!newTotal){ alert('Paket seçiniz.'); return; }
  const m=DB.memberById(memberId);
  if(!m){ alert('Üye bulunamadı.'); return; }
  DB.updateMember(memberId,{
    packageTotal:newTotal,
    packageUsed:0,
    cancelUsed:0,
    cancelTotal:newTotal===8?2:0,
  });
  document.getElementById('renewmodal')?.classList.add('hide');
  alert('Paket başarıyla yenilendi!');
  go('member-detail',{id:memberId,tab:'paket'});
}

function delMeasure(measId,memberId){
  if(confirm('Bu ölçümü silmek istiyor musunuz?')){ DB.deleteMeasure(measId); go('member-detail',{id:memberId,tab:'olcum'}); }
}

function saveSettings(){
  const raw=document.getElementById('spk')?.value||'';
  const opts=raw.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>0);
  if(!opts.length){ alert('Geçerli paket seçenekleri giriniz.'); return; }
  DB.saveSettings({...DB.settings(),packageOptions:opts});
  alert('Ayarlar kaydedildi.');
}

function exportData(){
  const data={users:DB._g('gh_users'),members:DB._g('gh_members'),
    measures:DB._g('gh_measures'),settings:DB._g('gh_settings'),date:new Date().toISOString()};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`gymhub-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

function importData(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.users)   DB._s('gh_users',d.users);
      if(d.members) DB._s('gh_members',d.members);
      if(d.measures)DB._s('gh_measures',d.measures);
      if(d.settings)DB._s('gh_settings',d.settings);
      alert('Veriler başarıyla içe aktarıldı.');
      go('dashboard');
    }catch{ alert('Geçersiz dosya.'); }
  };
  r.readAsText(file);
}

// Enter key → login
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&VIEW==='login') doLogin();
});

document.head.appendChild(style);

go(Auth.me()?'dashboard':'login');

  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
